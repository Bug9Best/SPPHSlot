<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital - Discovery Opening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            touch-action: none;
        }

        .phase-transition {
            transition: all 1s ease-in-out;
        }

        .hidden-phase {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .active-phase {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .gold-glow {
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.6));
        }

        .scan-mock-btn {
            pointer-events: auto;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .scan-mock-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <canvas id="mainCanvas" class="fixed inset-0"></canvas>

    <!-- UI Layer -->
    <div class="fixed inset-0 flex flex-col items-center justify-between p-8 pointer-events-none">

        <!-- Phase 1: Discovery (Crowd Engagement) -->
        <div id="phase1"
            class="absolute inset-0 flex flex-col items-center justify-center active-phase phase-transition">
            <div class="text-center mb-10">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">DISCOVER THE FUTURE</h1>
                <p class="text-xl text-slate-400">กรุณาสแกน QR Code เพื่อร่วมสร้างกุญแจแห่งนวัตกรรม</p>
            </div>

            <div class="relative w-64 h-64 flex items-center justify-center">
                <svg id="keyShadow" class="absolute w-full h-full text-slate-800" viewBox="0 0 24 24"
                    fill="currentColor">
                    <path d="M7 11a4 4 0 1 1 0 8 4 4 0 0 1 0-8ZM7 11V5l2-2M11 5l-2 2M13 3l-2 2M7 13v4M3 15h4" />
                </svg>
                <div id="keyGoldWrapper" class="absolute w-full h-full overflow-hidden"
                    style="height: 0%; bottom: 0; transition: height 0.5s ease;">
                    <svg class="absolute w-full h-full text-yellow-500 gold-glow"
                        style="bottom: 0; height: 256px; width: 256px;" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 11a4 4 0 1 1 0 8 4 4 0 0 1 0-8ZM7 11V5l2-2M11 5l-2 2M13 3l-2 2M7 13v4M3 15h4" />
                    </svg>
                </div>
            </div>

            <div class="mt-12 text-center">
                <div id="progressText" class="text-3xl font-bold text-yellow-500 mb-2">0%</div>
                <div class="w-64 h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-yellow-500 transition-all duration-500" style="width: 0%">
                    </div>
                </div>
                <p class="mt-4 text-slate-500 italic">พลังจากผู้เข้าร่วมงาน: <span id="scanCount">0</span> / 50</p>

                <button onclick="mockScan()" class="mt-8 scan-mock-btn pointer-events-auto">จำลองคนสแกน (+5)</button>
            </div>
        </div>

        <!-- Phase 2: Opening Ceremony (VIP Action) -->
        <div id="phase2"
            class="absolute inset-0 flex flex-col items-center justify-center hidden-phase phase-transition">
            <div id="openingTitleArea" class="text-center mb-20 transition-all duration-1000">
                <h1 class="text-4xl md:text-6xl font-bold text-yellow-500 mb-2 drop-shadow-lg">GRAND OPENING</h1>
                <p class="text-xl text-yellow-200 tracking-widest uppercase">The Key is Ready</p>
            </div>

            <div id="lockInteractionArea"
                class="relative flex items-center justify-center w-full max-w-lg h-64 transition-all duration-1000">
                <div id="readyKey"
                    class="absolute left-0 w-24 h-24 cursor-pointer pointer-events-auto z-20 transition-all duration-700 ease-in-out">
                    <svg class="w-full h-full text-yellow-500 gold-glow animate-bounce" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path d="M7 11a4 4 0 1 1 0 8 4 4 0 0 1 0-8ZM7 11V5l2-2M11 5l-2 2M13 3l-2 2M7 13v4M3 15h4" />
                    </svg>
                </div>

                <div id="targetLock" class="absolute right-0 w-32 h-32 flex items-center justify-center">
                    <div class="absolute inset-0 bg-yellow-500/10 rounded-full animate-ping"></div>
                    <svg class="w-full h-full text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <p class="absolute -bottom-10 whitespace-nowrap text-sm text-slate-400">นำกุญแจมาแตะที่แม่กุญแจ</p>
                </div>
            </div>

            <p id="vipInstruction" class="mt-20 text-yellow-200/50 animate-pulse transition-all">
                ท่านประธานกรุณาแตะที่กุญแจเพื่อเริ่มพิธี</p>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        // Backdrop Image
        const backdropImg = new Image();
        // เปลี่ยน URL ตรงนี้เป็นรูป Backdrop จริงของงาน
        backdropImg.src = 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&q=80&w=1920';

        // State Management
        let scanCount = 0;
        const targetScans = 50;
        let currentPhase = 1;
        let isUnlocked = false;
        let doorOpeningInProgress = false;
        let doorOffset = 0;
        let backdropAlpha = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 15, y: (Math.random() - 0.5) * 15 };
                this.alpha = 1; this.friction = 0.96;
                this.gravity = 0.05;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, Math.random() * 3 + 1, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() {
                this.velocity.y += this.gravity;
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createBurst(x, y) {
            const colors = ['#eab308', '#fbbf24', '#ffffff', '#ca8a04'];
            for (let i = 0; i < 80; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }

        // --- Phase 1 Logic ---
        function mockScan() {
            if (currentPhase !== 1) return;
            scanCount += 5;
            if (scanCount > targetScans) scanCount = targetScans;

            const percent = (scanCount / targetScans) * 100;
            document.getElementById('keyGoldWrapper').style.height = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = Math.floor(percent) + '%';
            document.getElementById('scanCount').innerText = scanCount;

            if (scanCount >= targetScans) {
                setTimeout(goToPhase2, 1200);
            }
        }

        function goToPhase2() {
            createBurst(width / 2, height / 2);
            document.getElementById('phase1').classList.remove('active-phase');
            document.getElementById('phase1').classList.add('hidden-phase');

            setTimeout(() => {
                currentPhase = 2;
                document.getElementById('phase2').classList.remove('hidden-phase');
                document.getElementById('phase2').classList.add('active-phase');
            }, 1000);
        }

        // --- Phase 2 Logic ---
        const readyKey = document.getElementById('readyKey');

        readyKey.addEventListener('click', () => {
            if (currentPhase !== 2 || isUnlocked) return;

            // แอนิเมชันกุญแจวิ่งไปที่แม่กุญแจ
            readyKey.style.left = 'calc(100% - 110px)';
            readyKey.style.transform = 'rotate(90deg) scale(0.8)';

            setTimeout(() => {
                isUnlocked = true;
                createBurst(width / 2 + 180, height / 2);
                triggerFinalOpening();
            }, 700);
        });

        function triggerFinalOpening() {
            // ซ่อน UI ของ Phase 2 เพื่อให้เห็น Backdrop ชัดๆ
            document.getElementById('openingTitleArea').style.opacity = '0';
            document.getElementById('lockInteractionArea').style.opacity = '0';
            document.getElementById('vipInstruction').style.opacity = '0';

            setTimeout(() => {
                doorOpeningInProgress = true;
                // จุดพลุเฉลิมฉลอง
                createBurst(width / 4, height / 3);
                createBurst(3 * width / 4, height / 3);
            }, 500);
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, width, height);

            // วาด Backdrop Image ไว้หลังประตู
            if (doorOpeningInProgress) {
                backdropAlpha = Math.min(1, backdropAlpha + 0.01);
                ctx.save();
                ctx.globalAlpha = backdropAlpha;

                // คำนวณ Aspect Ratio ให้ภาพเต็มจอ (Cover)
                const scale = Math.max(width / backdropImg.width, height / backdropImg.height);
                const x = (width / 2) - (backdropImg.width / 2) * scale;
                const y = (height / 2) - (backdropImg.height / 2) * scale;
                ctx.drawImage(backdropImg, x, y, backdropImg.width * scale, backdropImg.height * scale);

                // ใส่ Overlay มืดๆ นิดนึงเพื่อให้ตัวอักษรอ่านง่าย
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, width, height);
                ctx.restore();

                // อัปเดตการเลื่อนประตู
                doorOffset += (width / 2 - doorOffset) * 0.04;

                // วาดประตูแยกออก
                ctx.fillStyle = '#0f172a'; // สีเนื้อประตู
                // ประตูซ้าย
                ctx.fillRect(0 - doorOffset, 0, width / 2, height);
                // ประตูขวา
                ctx.fillRect(width / 2 + doorOffset, 0, width / 2, height);

                // เส้นขอบประตูสีทอง
                ctx.strokeStyle = '#ca8a04';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(width / 2 - doorOffset, 0);
                ctx.lineTo(width / 2 - doorOffset, height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(width / 2 + doorOffset, 0);
                ctx.lineTo(width / 2 + doorOffset, height);
                ctx.stroke();

                // เมื่อประตูเปิดกว้างพอ แสดงข้อความเปิดงาน
                if (doorOffset > width / 4) {
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'black';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 60px Kanit';
                    ctx.fillText('ขอเปิดงานประชุมวิชาการ', width / 2, height / 2 - 20);
                    ctx.fillStyle = '#eab308';
                    ctx.font = 'bold 40px Kanit';
                    ctx.fillText('SMART HOSPITAL CONFERENCE 2026', width / 2, height / 2 + 50);
                    ctx.restore();
                }
            }

            // จัดการอนุภาคพลุ
            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else { p.update(); p.draw(); }
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
