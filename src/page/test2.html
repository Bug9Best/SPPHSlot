<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital - Energy & Biometric Opening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            touch-action: none;
        }

        .phase-transition {
            transition: all 1s ease-in-out;
        }

        .hidden-phase {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .active-phase {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .cyan-glow {
            filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.6));
        }

        .scan-mock-btn {
            pointer-events: auto;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .scan-mock-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* เอฟเฟกต์เส้นสแกนฝ่ามือ */
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #22d3ee;
            box-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee;
            top: 0;
            left: 0;
            opacity: 0;
        }

        .is-scanning .scanner-line {
            opacity: 1;
            animation: scanAnim 1.5s infinite linear;
        }

        @keyframes scanAnim {
            0% {
                top: 0%;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0%;
            }
        }
    </style>
</head>

<body>

    <canvas id="mainCanvas" class="fixed inset-0"></canvas>

    <!-- UI Layer -->
    <div class="fixed inset-0 flex flex-col items-center justify-between p-8 pointer-events-none z-10">

        <!-- Phase 1: Energy Tube (Crowd Engagement) -->
        <div id="phase1"
            class="absolute inset-0 flex flex-col items-center justify-center active-phase phase-transition">
            <div class="text-center mb-10">
                <h1
                    class="text-4xl md:text-5xl font-bold mb-4 text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">
                    CHARGE THE CORE</h1>
                <p class="text-xl text-slate-400">กรุณาสแกน QR Code เพื่อร่วมชาร์จพลังงานสู่นวัตกรรม</p>
            </div>

            <!-- หลอดพลังงาน -->
            <div
                class="relative w-32 h-64 bg-slate-900 rounded-full border-4 border-slate-700 overflow-hidden shadow-[0_0_20px_rgba(0,0,0,0.8)_inset]">
                <!-- พลังงานที่เติมขึ้นมา -->
                <div id="energyFill"
                    class="absolute bottom-0 w-full bg-gradient-to-t from-cyan-600 to-cyan-400 transition-all duration-500 shadow-[0_0_30px_rgba(34,211,238,0.8)]"
                    style="height: 0%"></div>
                <!-- แสงสะท้อนกระจก -->
                <div class="absolute inset-0 bg-gradient-to-r from-white/10 to-transparent w-1/2 pointer-events-none">
                </div>
                <!-- ขีดบอกระดับ -->
                <div class="absolute inset-0 flex flex-col justify-between py-4 opacity-30">
                    <div class="w-full h-px bg-white"></div>
                    <div class="w-full h-px bg-white"></div>
                    <div class="w-full h-px bg-white"></div>
                    <div class="w-full h-px bg-white"></div>
                </div>
            </div>

            <div class="mt-12 text-center">
                <div id="progressText" class="text-4xl font-bold text-cyan-400 mb-2 drop-shadow-md">0%</div>
                <p class="mt-2 text-slate-400 italic">พลังงานจากผู้เข้าร่วมงาน: <span id="scanCount"
                        class="text-white font-bold">0</span> / 50</p>

                <button onclick="mockScan()" class="mt-8 scan-mock-btn pointer-events-auto">จำลองคนสแกน (+5)</button>
            </div>
        </div>

        <!-- Phase 2: Hand Scan (VIP Action) -->
        <div id="phase2"
            class="absolute inset-0 flex flex-col items-center justify-center hidden-phase phase-transition">
            <div class="text-center mb-16">
                <h1 class="text-4xl md:text-5xl font-bold text-cyan-400 mb-2 drop-shadow-lg">BIOMETRIC VERIFICATION</h1>
                <p class="text-xl text-cyan-200/70 tracking-widest uppercase">ระบบพร้อมสำหรับการยืนยันตัวตน</p>
            </div>

            <!-- จุดสแกนฝ่ามือ -->
            <div id="handScanBtn"
                class="relative w-48 h-48 flex items-center justify-center cursor-pointer pointer-events-auto transition-transform hover:scale-105 active:scale-95">
                <!-- วงแหวนล้อมรอบ -->
                <div class="absolute inset-0 rounded-full border-2 border-cyan-500/30 animate-pulse"></div>
                <div
                    class="absolute inset-[-20px] rounded-full border border-cyan-500/10 animate-[spin_4s_linear_infinite]">
                </div>

                <!-- ไอคอนฝ่ามือ -->
                <svg class="w-32 h-32 text-cyan-500 cyan-glow z-10" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 11V6a2 2 0 0 0-4 0v4" />
                    <path d="M14 10V4a2 2 0 0 0-4 0v6" />
                    <path d="M10 10.5V3a2 2 0 0 0-4 0v9" />
                    <path
                        d="M7 15a2 2 0 0 1-2-2V8a2 2 0 0 0-4 0v9a6 6 0 0 0 6 6h2.436a2 2 0 0 0 1.94-1.531l1.458-5.832A2 2 0 0 1 18.775 14H20a2 2 0 0 0 2-2v-1a2 2 0 0 0-2-2h-2z" />
                </svg>

                <!-- เส้นสแกนวิ่งขึ้นลง -->
                <div class="scanner-line z-20"></div>
            </div>

            <p id="vipInstruction" class="mt-16 text-cyan-200/60 text-lg animate-pulse transition-all">
                ท่านประธานกรุณาแตะที่ฝ่ามือเพื่อยืนยันตัวตน</p>
        </div>

        <!-- Phase 3: Access Granted & Countdown -->
        <div id="phase3"
            class="absolute inset-0 flex flex-col items-center justify-center hidden-phase phase-transition">
            <div class="bg-slate-900/80 backdrop-blur-md border border-cyan-500/50 p-10 rounded-2xl shadow-[0_0_50px_rgba(6,182,212,0.3)] text-center transform scale-95 transition-transform duration-500"
                id="dialogBox">
                <!-- ไอคอนติ๊กถูก -->
                <div class="w-20 h-20 mx-auto bg-green-500/20 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.8)]" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h2 class="text-4xl font-bold text-green-400 tracking-wider mb-2">ACCESS GRANTED</h2>
                <p class="text-xl text-slate-300 mb-8">ยืนยันตัวตนเสร็จสิ้น</p>

                <div class="w-full h-px bg-cyan-500/30 mb-8"></div>

                <p class="text-cyan-400 uppercase tracking-widest text-sm mb-2">ระบบจะเปิดในอีก</p>
                <div id="countdownText"
                    class="text-7xl font-bold text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">3</div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        // Backdrop Image
        const backdropImg = new Image();
        backdropImg.src = 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&q=80&w=1920';

        // State Management
        let scanCount = 0;
        const targetScans = 50;
        let currentPhase = 1;
        let doorOpeningInProgress = false;
        let doorOffset = 0;
        let backdropAlpha = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 15, y: (Math.random() - 0.5) * 15 };
                this.alpha = 1; this.friction = 0.96;
                this.gravity = 0.05;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, Math.random() * 3 + 1, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() {
                this.velocity.y += this.gravity;
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createBurst(x, y) {
            // เปลี่ยนสีพลุให้เป็นโทนฟ้า-เขียว ให้เข้ากับธีม
            const colors = ['#22d3ee', '#06b6d4', '#4ade80', '#ffffff'];
            for (let i = 0; i < 80; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }

        // --- Phase 1: Energy Tube Logic ---
        function mockScan() {
            if (currentPhase !== 1) return;
            scanCount += 5;
            if (scanCount > targetScans) scanCount = targetScans;

            const percent = (scanCount / targetScans) * 100;
            document.getElementById('energyFill').style.height = percent + '%';
            document.getElementById('progressText').innerText = Math.floor(percent) + '%';
            document.getElementById('scanCount').innerText = scanCount;

            // เอฟเฟกต์กระเพื่อมเล็กน้อยตอนเติมพลังงาน
            const tube = document.getElementById('energyFill').parentElement;
            tube.style.transform = 'scale(1.05)';
            setTimeout(() => tube.style.transform = 'scale(1)', 150);

            if (scanCount >= targetScans) {
                setTimeout(goToPhase2, 1000);
            }
        }

        function goToPhase2() {
            createBurst(width / 2, height / 2);
            document.getElementById('phase1').classList.remove('active-phase');
            document.getElementById('phase1').classList.add('hidden-phase');

            setTimeout(() => {
                currentPhase = 2;
                document.getElementById('phase2').classList.remove('hidden-phase');
                document.getElementById('phase2').classList.add('active-phase');
            }, 1000);
        }

        // --- Phase 2: Hand Scan Logic ---
        const handScanBtn = document.getElementById('handScanBtn');
        let isScanning = false;

        handScanBtn.addEventListener('click', () => {
            if (currentPhase !== 2 || isScanning) return;
            isScanning = true;

            // เริ่มอนิเมชันสแกน
            handScanBtn.classList.add('is-scanning');
            document.getElementById('vipInstruction').innerText = "กำลังประมวลผลข้อมูลชีวมิติ...";
            document.getElementById('vipInstruction').classList.remove('animate-pulse');
            document.getElementById('vipInstruction').classList.add('text-cyan-400');

            // จำลองเวลาสแกน 2 วินาที
            setTimeout(() => {
                goToPhase3();
            }, 2000);
        });

        // --- Phase 3: Access Granted & Countdown ---
        function goToPhase3() {
            document.getElementById('phase2').classList.remove('active-phase');
            document.getElementById('phase2').classList.add('hidden-phase');

            setTimeout(() => {
                currentPhase = 3;
                document.getElementById('phase3').classList.remove('hidden-phase');
                document.getElementById('phase3').classList.add('active-phase');

                // เอฟเฟกต์เด้งโชว์ Dialog
                setTimeout(() => {
                    document.getElementById('dialogBox').classList.remove('scale-95');
                    document.getElementById('dialogBox').classList.add('scale-100');
                    startCountdown();
                }, 100);
            }, 800);
        }

        function startCountdown() {
            let count = 3;
            const countEl = document.getElementById('countdownText');

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countEl.innerText = count;
                    // เอฟเฟกต์กระตุกตัวเลข
                    countEl.style.transform = 'scale(1.2)';
                    setTimeout(() => countEl.style.transform = 'scale(1)', 150);
                } else {
                    clearInterval(interval);
                    triggerFinalOpening();
                }
            }, 1000);
        }

        function triggerFinalOpening() {
            // ซ่อน Dialog เตรียมเปิดประตู
            document.getElementById('phase3').style.opacity = '0';

            setTimeout(() => {
                doorOpeningInProgress = true;
                // จุดพลุเฉลิมฉลอง
                createBurst(width / 4, height / 3);
                createBurst(3 * width / 4, height / 3);
                createBurst(width / 2, height / 2);
            }, 500);
        }

        // --- Canvas Rendering (Doors & Backdrop) ---
        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, width, height);

            if (doorOpeningInProgress) {
                backdropAlpha = Math.min(1, backdropAlpha + 0.015);
                ctx.save();
                ctx.globalAlpha = backdropAlpha;

                // วาดรูปภาพ Backdrop
                const scale = Math.max(width / backdropImg.width, height / backdropImg.height);
                const x = (width / 2) - (backdropImg.width / 2) * scale;
                const y = (height / 2) - (backdropImg.height / 2) * scale;
                ctx.drawImage(backdropImg, x, y, backdropImg.width * scale, backdropImg.height * scale);

                // Overlay ให้ตัวอักษรอ่านง่าย
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, 0, width, height);
                ctx.restore();

                // ความเร็วในการเปิดประตู
                doorOffset += (width / 2 - doorOffset) * 0.03;

                // วาดประตูแยกออก (เปลี่ยนสีให้ดูล้ำขึ้น)
                ctx.fillStyle = '#0f172a'; // สีเนื้อประตู
                ctx.fillRect(0 - doorOffset, 0, width / 2, height); // ซ้าย
                ctx.fillRect(width / 2 + doorOffset, 0, width / 2, height); // ขวา

                // เส้นขอบประตูสีฟ้านีออน
                ctx.strokeStyle = '#06b6d4';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#06b6d4';

                ctx.beginPath();
                ctx.moveTo(width / 2 - doorOffset, 0);
                ctx.lineTo(width / 2 - doorOffset, height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(width / 2 + doorOffset, 0);
                ctx.lineTo(width / 2 + doorOffset, height);
                ctx.stroke();
                ctx.shadowBlur = 0; // reset shadow

                // แสดงข้อความเมื่อประตูเปิดระดับนึง
                if (doorOffset > width / 4) {
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'black';
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 50px Kanit';
                    ctx.fillText('ยินดีต้อนรับสู่โลกแห่งนวัตกรรม', width / 2, height / 2 - 20);
                    ctx.fillStyle = '#22d3ee';
                    ctx.font = 'bold 30px Kanit';
                    ctx.fillText('SMART HOSPITAL CONFERENCE 2026', width / 2, height / 2 + 40);
                    ctx.restore();
                }
            }

            // จัดการอนุภาคพลุ
            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else { p.update(); p.draw(); }
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
